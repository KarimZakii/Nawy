version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: nawy_apartments_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nawy_apartments_backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/postgres?schema=public"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:push && node dist/index.js"
    volumes:
      - ./server:/app
      - /app/node_modules
      - /app/dist

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: nawy_apartments_frontend
    ports:
      - "3000:3000"
    environment:
      API_URL_INTERNAL: http://backend:4000
    depends_on:
      - backend

volumes:
  postgres_data:
